name: Build And Release

on:
  push:
    tags:
      - "v*"

env:
  GRADLE_ROOT: src
  REGISTRY: ghcr.io
  SERVER_IMAGE_NAME: linkstash-server

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.1

      - name: Derive release version
        id: version
        run: |
          set -euo pipefail
          raw_tag="${GITHUB_REF_NAME}"
          version_name="${raw_tag#v}"
          if [[ ! "${version_name}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected tag format vMAJOR.MINOR.PATCH, got ${raw_tag}" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          version_code=$((10#${major} * 10000 + 10#${minor} * 100 + 10#${patch}))

          {
            echo "version_name=${version_name}"
            echo "version_code=${version_code}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Java
        uses: actions/setup-java@v5.1.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5.0.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Validate and decode Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required" >&2
            exit 1
          fi
          if [[ -z "${ANDROID_RELEASE_STORE_PASSWORD}" ]]; then
            echo "ANDROID_RELEASE_STORE_PASSWORD secret is required" >&2
            exit 1
          fi
          if [[ -z "${ANDROID_RELEASE_KEY_ALIAS}" ]]; then
            echo "ANDROID_RELEASE_KEY_ALIAS secret is required" >&2
            exit 1
          fi
          if [[ -z "${ANDROID_RELEASE_KEY_PASSWORD}" ]]; then
            echo "ANDROID_RELEASE_KEY_PASSWORD secret is required" >&2
            exit 1
          fi

          mkdir -p "${RUNNER_TEMP}/android-signing"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-signing/release.keystore"

      - name: Build release APK
        working-directory: ${{ env.GRADLE_ROOT }}
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ runner.temp }}/android-signing/release.keystore
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ANDROID_RELEASE_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew :androidApp:assembleRelease

      - name: Prepare APK asset
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets/android
          apk_path="$(find "${{ env.GRADLE_ROOT }}/androidApp/build/outputs/apk/release" -maxdepth 1 -name '*.apk' ! -name '*unsigned.apk' | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "Signed release APK not found" >&2
            exit 1
          fi

          cp "${apk_path}" "release-assets/android/linkstash-${VERSION_NAME}-android-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: android-release-apk
          path: release-assets/android/*.apk
          if-no-files-found: error

  build-server-image:
    name: Build Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.SERVER_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and publish server image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./src
          file: ./src/server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare server release assets
        env:
          SERVER_DIGEST: ${{ steps.build.outputs.digest }}
          SERVER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_ref="${{ env.REGISTRY }}/${owner}/${{ env.SERVER_IMAGE_NAME }}:${GITHUB_REF_NAME}"

          mkdir -p release-assets/server
          docker pull "${image_ref}"
          docker save "${image_ref}" | gzip > "release-assets/server/linkstash-server-${GITHUB_REF_NAME}-linux-amd64.tar.gz"

          cat > "release-assets/server/linkstash-server-${GITHUB_REF_NAME}-image.txt" <<EOF
          Image: ${image_ref}
          Digest: ${SERVER_DIGEST}

          Published tags:
          ${SERVER_TAGS}
          EOF

      - name: Upload server release assets
        uses: actions/upload-artifact@v6.0.0
        with:
          name: server-release-assets
          path: release-assets/server/*
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build-android
      - build-server-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v8.0.0
        with:
          name: android-release-apk
          path: release-assets/android

      - name: Download server release assets
        uses: actions/download-artifact@v8.0.0
        with:
          name: server-release-assets
          path: release-assets/server

      - name: Generate release notes
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_ref="${{ env.REGISTRY }}/${owner}/${{ env.SERVER_IMAGE_NAME }}:${GITHUB_REF_NAME}"

          cat > release-notes.md <<EOF
          ## Assets
          - Android APK: signed release build from \`:androidApp:assembleRelease\`
          - Server image archive: linux/amd64 Docker image tarball for the same tag

          ## Container image
          - GHCR: \`${image_ref}\`

          ## Compose install
          - Use \`src/server/compose.yaml\` with \`LINKSTASH_SERVER_IMAGE=${image_ref}\`.
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.5.0
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            release-assets/android/*.apk
            release-assets/server/*.tar.gz
            release-assets/server/*.txt
