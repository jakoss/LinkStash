<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LinkStash</title>
    <link rel="icon" href="data:,">
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #f3efe7;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const isValidLocale = (value) => typeof value === 'string' && value.trim() !== '' && value !== 'undefined';
        const fallbackLanguage = isValidLocale(document.documentElement.lang) ? document.documentElement.lang : 'en-US';
        const resolvedLanguage = isValidLocale(window.navigator.language) ? window.navigator.language : fallbackLanguage;
        const resolvedLanguages = Array.isArray(window.navigator.languages)
          ? window.navigator.languages.filter(isValidLocale)
          : [];

        if (!isValidLocale(window.navigator.language)) {
          try {
            Object.defineProperty(window.navigator, 'language', {
              configurable: true,
              get: () => resolvedLanguage,
            });
          } catch (_) {}
        }

        if (resolvedLanguages.length === 0) {
          try {
            Object.defineProperty(window.navigator, 'languages', {
              configurable: true,
              get: () => [resolvedLanguage],
            });
          } catch (_) {}
        }
      })();
    </script>
    <script src="linkstash-web.js"></script>
  </body>
</html>
